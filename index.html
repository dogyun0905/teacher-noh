<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김해고 모의 수강신청 프로그램</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div id="login-container" class="login-section">
        <h2>김해고 모의 수강신청 프로그램</h2>
        <p>이름과 학년을 선택하여 로그인하세요.</p>
        <input type="text" id="username-input" placeholder="이름 또는 학번 입력" onkeypress="if(event.keyCode==13) login()">
        
        <select id="grade-input" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
            <option value="2">고등학교 2학년</option>
            <option value="3">고등학교 3학년</option>
        </select>

        <button class="btn-enroll" onclick="login()" style="width: 100%; padding: 12px; font-size: 16px;">로그인 / 시작하기</button>
    </div>

    <div id="app-container" style="display: none;">
        <div class="header-area">
            <div style="display: flex; align-items: center; gap: 20px; flex-wrap: wrap;">
                <h1 style="margin: 0; color: #333;">김해고 모의 수강신청 프로그램</h1>
                <button class="btn-main-nav" id="nav-qa-btn" onclick="showQAView()">질문 게시판 가기</button>
                <button class="btn-main-nav" id="nav-course-btn" onclick="showCourseView()" style="display: none; background-color: #6c757d;">수강신청 화면으로</button>
            </div>
            <div class="user-info" style="display: flex; gap: 10px; align-items: center;">
                <span id="user-greeting" style="font-weight: bold;"></span>
                <button class="btn-cancel" onclick="logout()">로그아웃</button>
            </div>
        </div>
        
        <div id="course-view" class="container">
            <div class="left-panel">
                <div class="section">
                    <h2>개설 과목 목록</h2>
                    <div class="filter-container">
                        <input type="text" id="search-input" placeholder="과목명이나 설명을 검색하세요...">
                    </div>
                    <div id="course-list"></div>
                </div>
            </div>

            <div class="section" id="cart-section" style="display: flex; flex-direction: column;">
                <button class="close-cart-btn" onclick="toggleMobileCart()">내역 숨기기</button>
                <h2>수강 내역</h2>
                <div id="my-courses" style="flex-grow: 1;"></div>
                <button class="btn-submit" onclick="submitCourses()" style="margin-top: 20px; width: 100%; padding: 15px; font-size: 16px;">모의 수강신청 제출</button>
            </div>
        </div>

        <div id="qa-view" class="container" style="display: none; flex-direction: column;">
            <div class="section" style="width: 100%; box-sizing: border-box;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #0056b3; padding-bottom: 15px;">
                    <h2 style="margin: 0; color: #0056b3;">Q&A 질문 게시판</h2>
                    <span style="font-size: 14px; color: #666;">모의 수강신청에 대해 궁금한 점을 교사에게 직접 질문할 수 있습니다.</span>
                </div>
                <div id="qa-form" style="margin-bottom: 30px; background-color: #f8f9fa; padding: 20px; border-radius: 8px; border: 1px solid #dee2e6;"></div>
                <div id="qa-list"></div>
            </div>
        </div>
    </div>

    <button id="mobile-cart-btn" class="mobile-cart-btn" onclick="toggleMobileCart()">
        수강 내역 보기 <span id="cart-count-badge" class="badge">0</span>
    </button>
    <div id="cart-overlay" class="cart-overlay" onclick="toggleMobileCart()"></div>

    <div id="modal" class="modal">
        <div class="modal-content" style="width: 80%; height: 85vh; max-width: 1000px; display: flex; flex-direction: column;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                <div>
                    <h2 id="modal-title" style="margin-top: 0;"></h2>
                    <div id="modal-category" style="font-weight: bold; color: #0056b3; margin-bottom: 15px;"></div>
                </div>
                <span class="close-button" onclick="closeModal()" style="font-size: 28px; line-height: 1;">&times;</span>
            </div>
            <div id="pdf-container" style="flex-grow: 1; overflow-y: auto; text-align: center; border: 1px solid #ccc; background-color: #525659; border-radius: 4px; padding: 10px;">
                <canvas id="pdf-canvas" style="max-width: 100%; height: auto; box-shadow: 0 2px 5px rgba(0,0,0,0.3); background-color: white;"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
