<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김해고 모의 수강신청 프로그램</title>
    <link rel="icon" href="logo.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div id="login-container" class="login-section">
        <img src="logo.png" alt="김해고 로고" class="login-logo">
        <h2>김해고 모의 수강신청 프로그램</h2>
        <p>이름과 학년을 선택하여 로그인하세요.</p>
        <input type="text" id="username-input" placeholder="이름 또는 학번 입력" onkeypress="if(event.keyCode==13) login()">
        
        <select id="grade-input" style="width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px;">
            <option value="2">고등학교 2학년</option>
            <option value="3">고등학교 3학년</option>
        </select>

        <button class="btn-enroll" onclick="login()" style="width: 100%; padding: 12px; font-size: 16px;">로그인 / 시작하기</button>
    </div>

    <div id="app-container" style="display: none;">
        <div class="header-area">
            <div class="header-main-row">
                <img src="logo.png" alt="김해고 로고" class="header-logo">
                <div style="display:flex; flex-direction:column; gap:2px;">
                    <h1 id="main-title" style="margin:0;">김해고 모의 수강신청</h1>
                    <span style="font-size:11px; color:#adb5bd; font-weight:normal; letter-spacing:0.3px;">made by 도균쌤</span>
                </div>
                <button class="btn-main-nav" id="nav-qa-btn" onclick="showQAView()">질문 게시판</button>
                <button class="btn-main-nav" id="nav-history-btn" onclick="showHistoryView()">수강내역 조회</button>
                <button class="btn-main-nav" id="nav-course-btn" onclick="showCourseView()" style="display: none;">← 수강신청으로</button>
            </div>
            <div class="user-info">
                <span id="user-greeting"></span>
                <button class="btn-cancel-top" onclick="logout()">로그아웃</button>
            </div>
        </div>
        
        <div id="course-view" class="container">
            <div class="left-panel">
                <div class="section">
                    <h2>개설 과목 목록</h2>
                    <div class="filter-container">
                        <input type="text" id="search-input" placeholder="과목명이나 설명을 검색하세요...">
                    </div>
                    <div id="course-list"></div>
                </div>
            </div>

            <div class="section" id="cart-section">
                <button class="close-cart-btn" onclick="toggleMobileCart()">내역 숨기기</button>
                <h2>수강 내역</h2>
                <div id="credit-summary-cart"></div>
                <div id="my-courses"></div>
                <button class="btn-submit" onclick="submitCourses()">모의 수강신청 제출</button>
            </div>
        </div>

        <div id="history-view" class="container" style="display: none; flex-direction: column;">
            <div class="section" style="width: 100%; box-sizing: border-box;">
                <div class="qa-header">
                    <h2 style="margin: 0; color: #0056b3;" id="history-title">수강내역 조회</h2>
                    <p id="history-subtitle">제출된 수강신청 내역을 확인합니다.</p>
                </div>
                <div id="history-filter" style="margin-bottom: 20px; display: none;">
                    <input type="text" id="history-search" placeholder="학생 이름 검색..." style="width:100%; padding:12px; border:1px solid #ddd; border-radius:6px; font-size:16px; box-sizing:border-box;">
                </div>
                <div id="history-list"></div>
            </div>
        </div>

        <div id="qa-view" class="container" style="display: none; flex-direction: column;">
            <div class="section" style="width: 100%; box-sizing: border-box;">
                <div class="qa-header">
                    <h2 style="margin: 0; color: #0056b3;">Q&A 질문 게시판</h2>
                    <p>수강신청에 대해 궁금한 점을 질문할 수 있습니다.</p>
                </div>
                <div id="qa-form" class="qa-form-box"></div>
                <div id="qa-list"></div>
            </div>
        </div>
    </div>

    <button id="mobile-cart-btn" class="mobile-cart-btn" onclick="toggleMobileCart()">
        🛒 수강 내역 <span id="cart-count-badge" class="badge">0</span>
    </button>
    <div id="cart-overlay" class="cart-overlay" onclick="toggleMobileCart()"></div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h2 id="modal-title"></h2>
                    <div id="modal-category"></div>
                </div>
                <span class="close-button" onclick="closeModal()">&times;</span>
            </div>
            <div id="pdf-container">
                <canvas id="pdf-canvas"></canvas>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
